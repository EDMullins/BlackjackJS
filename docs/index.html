<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
</head>

<body>
    <header class="d-flex justify-content-between align-items-center">
        <h1><i class="bi bi-suit-spade"></i></h1>
        <h1 class="text-center">Blackjack</h1>
        <div>
            <button id="statsMenuBtn" class="btn btn-primary"><i class="bi bi-list"></i></button>
        </div>
    </header>

    <!-- Game Sections -->
    <div class="dealerSection">
        <div class="d-flex justify-content-between mt-4 mx-4" id="topRow">
            <h2 class="softText" id="dealerHandValue">Dealer's Hand:</h2>
            <div>
                <div class="moneyTab">
                    <h2 class="softText" id="money">$</h2>
                </div>
                <h4 class="softText" id="moneyPopup"></h4>
            </div>
        </div>
        <div class="cardSection d-flex flex-wrap justify-content-center" id="dealerCardSection">
            <!-- Cards will be appended here -->
        </div>
    </div>

    <div class="playerSection mt-3">
        <div class="d-flex justify-content-between mx-4">
            <h2 class="softText" id="playerHandValue">Player's Hand:</h2>
        </div>
        <div class="cardSection d-flex flex-wrap justify-content-center" id="playerCardSection">
            <!-- Cards will be appended here -->
        </div>
    </div>

    <div class="d-flex justify-content-end m-2" id="hitStandBtns">
        <button disabled class="btn btn-primary me-3" id="hit">Hit</button>
        <button disabled class="btn btn-primary" id="stand">Stand</button>
    </div>

    <footer class="d-flex align-items-center">
        <h4 id="levelDisplay"></h4>
        <div id="xpContainer">
            <div id="xpBar"></div>
        </div>
        <h4 id="mult"></h4>
    </footer>

    <!-- Different Menus (not always visible) -->
    <div class="d-flex justify-content-center">
        <div class="flex-column align-items-center menuPanel hidden" id="roundOverSection">
            <h2 id="roundResult">
                <!-- Result will be added here -->
            </h2>
            <button class="btn btn-primary" id="newHand">New Hand</button>
        </div>
    </div>

    <div class="d-flex justify-content-center">
        <div class="menuPanel hidden" id="betSection">
            <h2 class="mb-4">Enter your Bet</h2>
            <input type="text" id="bet" name="bet">
            <div class="mt-1"><span id="errorMsg"></span></div>
            <button id="betBtn" class="btn btn-primary mt-3" disabled>Place Bet</button>
        </div>
    </div>

    <div id="statsSection" class="stats-panel hidden">
        <div class="stats-header mb-2">
            <button id="loginMenuBtn" class="btn btn-primary">Login</button>
            <button id="statsCloseBtn" class="btn btn-primary"><i class="bi bi-x-lg"></i></button>
        </div>
        <h4>Player Stats:</h4>
        <div class="stats-content">
            <p id="statsMoney"></p>
            <p id="statsWins"></p>
            <p id="statsLosses"></p>
            <p id="statsLevel"></p>
            <p id="statsMoneyOnNewRound"></p>
            <p id="statsXP"></p>
            <hr>
            <a href="https://github.com/EDMullins/BlackjackJS" target="_blank" class="btn btn-primary">View Repo</a>
        </div>
    </div>

    <div class="justify-content-center menuPanel hidden" id="loginSection">
        <div class="d-flex justify-content-between">
            <h2>Login or Sign Up</h2>
            <button id="loginXBtn" class="btn btn-primary"><i class="bi bi-x-lg"></i></button>
        </div>
        <form class="authForm">
            <div class="mb-3">
                <p>Email</p>
                <input type="email" class="form-control" id="email" placeholder="Email" required>
            </div>
            <div class="mb-3">
                <p>Password</p>
                <input type="password" class="form-control" id="password" placeholder="Password" required>
            </div>
            <button type="button" class="btn btn-primary" id="loginBtn">Login</button>
            <button type="button" class="btn btn-secondary mt-2" id="registerBtn">Register</button>
            <div id="authMessage" class="mt-2"></div>
        </form>
    </div>
    <script src="scripts/main.js" type="module"></script>
</body>

</html>
