<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
</head>

<body>
    <header class="d-flex justify-content-between align-items-center">
        <h1><i class="bi bi-suit-spade"></i></h1>
        <h1 class="text-center">Blackjack</h1>
        <div>
            <button id="statsMenuBtn" class="btn btn-primary"><i class="bi bi-list"></i></button>
        </div>
    </header>

    <!-- Game Sections -->
    <div class="dealerSection">
        <div class="d-flex mt-4 mx-4">
            <h2 id="dealerHandValue" class="softText">Dealer's Hand:</h2>
            <div id="moneySection">
                <div class="moneyTab">
                    <h2 id="money" class="softText">$</h2>
                </div>
                <h4 id="moneyPopup" class="softText"></h4>
            </div>
        </div>
        <div id="dealerCardSection" class="cardSection flex-wrap">
            <!-- Cards will be appended here -->
        </div>
    </div>

    <div class="playerSection mt-3">
        <div class="d-flex justify-content-between mx-4">
            <h2 id="playerHandValue" class="softText">Player's Hand:</h2>
        </div>
        <div id="playerCardSection" class="cardSection flex-wrap">
            <!-- Cards will be appended here -->
        </div>
        <!-- Split hand columns injected here by JS when splitting -->
    </div>

    <div class="d-flex justify-content-end m-2" id="hitStandBtns">
        <!-- Split button appears above Hit when a split is available -->
        <button id="split" class="btn btn-primary me-3 hidden">Split</button>
        <button disabled id="hit" class="btn btn-primary me-3">Hit</button>
        <button id="stand" disabled class="btn btn-primary">Stand</button>
    </div>

    <footer class="d-flex align-items-center">
        <h4 id="levelDisplay"></h4>
        <div id="xpContainer">
            <div id="xpBar"></div>
        </div>
        <h4 id="mult"></h4>
    </footer>

    <!-- Different Menus (not always visible) -->
    <div class="d-flex justify-content-center">
        <div id="roundOverSection" class="flex-column align-items-center menuPanel hidden">
            <h2 id="roundResult">
                <!-- Result will be added here -->
            </h2>
            <div id="roundData">
                <!-- Round data will be added here -->
            </div>
            <button id="newHand" class="btn btn-primary">New Hand</button>
        </div>
    </div>

    <div class="d-flex justify-content-center">
        <div id="betSection" class="menuPanel hidden">
            <h2 class="mb-4">Enter your Bet</h2>
            <input type="text" id="bet" name="bet">
            <div class="mt-1"><span id="errorMsg"></span></div>
            <button id="betBtn" class="btn btn-primary mt-3" disabled>Place Bet</button>
        </div>
    </div>

    <div id="statsSection" class="stats-panel hidden">
        <div class="menu-header mb-2">
            <button id="loginMenuBtn" class="btn btn-primary">Login</button>
            <button id="statsXBtn" class="btn btn-primary"><i class="bi bi-x-lg"></i></button>
        </div>
        <h4>Player Stats:</h4>
        <div id="stats-content">
            <p id="statsMoney"></p>
            <p id="statsWins"></p>
            <p id="statsLosses"></p>
            <p id="statsLevel"></p>
            <p id="statsMoneyOnNewRound"></p>
            <p id="statsXP"></p>
            <p id="statsWinStreakHigh"></p>
            <p id="statsGameWinsHigh"></p>
        </div>
        <hr>
        <div class="d-flex flex-column">
            <button class="storeBtn btn btn-primary ">Store</button>
            <button class="inventoryBtn btn btn-primary mt-2">Inventory</button>
            <a href="https://github.com/EDMullins/BlackjackJS" target="_blank" class="btn btn-primary mt-2">View Repo</a>
        </div>
    </div>

    <div id="loginSection" class="justify-content-center menuPanel hidden">
        <div class="d-flex justify-content-between">
            <h2>Login or Sign Up</h2>
            <button id="loginXBtn" class="btn btn-primary"><i class="bi bi-x-lg"></i></button>
        </div>
        <form id="authForm">
            <div class="mb-3">
                <p>Email</p>
                <input type="email" id="email" class="form-control" placeholder="Email" required>
            </div>
            <div class="mb-3">
                <p>Password</p>
                <input type="password" id="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="button" class="btn btn-primary" id="loginBtn">Login</button>
            <button type="button" class="btn btn-secondary mt-2" id="registerBtn">Register</button>
            <button type="button" class="btn btn-secondary mt-2" id="resetBtn">Reset Password</button>
            <div id="authMessage" class="mt-2"></div>
        </form>
    </div>

    <div id="storeSection" class="menuPanel hidden">
        <div class="d-flex justify-content-between align-items-center">
            <h1>Store</h1>
            <div>
                <button class="inventoryBtn btn btn-primary">Inventory</button>
                <button id="storeXBtn" class="btn btn-primary"><i class="bi bi-x-lg"></i></button>
            </div>
        </div>

        <hr>
        <div class="scrolling">
            <h2>Themes</h2>
            <div id="themeOptions">
                <!-- Themes from UIController get displayed here -->
            </div>
            <hr>
            <h2>Dealers</h2>
            <hr>
            <h2>Decks</h2>
        </div>
    </div>

    <div id="inventorySection" class="menuPanel hidden">
        <div class="d-flex justify-content-between align-items-center">
            <h1>Inventory</h1>
            <div>
                <button class="storeBtn btn btn-primary">Store</button>
                <button id="inventoryXBtn" class="btn btn-primary"><i class="bi bi-x-lg"></i></button>
            </div>
        </div>

        <hr>
        <div class="scrolling">
            <h2>Themes</h2>
            <div id="themeOptions">
                <!-- Themes from UIController get displayed here -->
            </div>
            <hr>
            <h2>Dealers</h2>
            <hr>
            <h2>Decks</h2>
        </div>
    </div>

    <h2 id="winStreak" class="softText"><!-- Current Win Streak --></h2>

    <div id="gameOver" class="justify-content-center align-items-center hidden">
        <h1 class="softText">Game Over</h1>
        <p class="softText">XP reset to 0</p>
        <button class="btn btn-primary" id="newGame">New Game</button>
        <div class="d-flex mt-3">
            <button class="storeBtn btn btn-primary me-3">Store</button>
            <button class="inventoryBtn btn btn-primary">Inventory</button>
        </div>
    </div>
    <script src="scripts/main.js" type="module"></script>
</body>

</html>
