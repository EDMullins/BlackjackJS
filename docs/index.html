<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
</head>

<body>
    <header class="d-flex justify-content-between align-items-center">
        <h1><i class="bi bi-suit-spade"></i></h1>
        <h1 class="text-center">Blackjack</h1>
        <a href="https://github.com/EDMullins/BlackjackJS" target="_blank" class="btn btn-primary">Repo</a>
    </header>

    <!-- Game Sections -->
    <div class="dealerSection">
        <div class="d-flex justify-content-between flex-grow-1 mt-4 mx-4">
            <h2 class="softText" id="dealerHandValue">Dealer's Hand:</h2>
            <div class="moneyTab">
                <h2 class="softText" id="money">$</h2>
            </div>
        </div>
        <div class="cardSection d-flex flex-wrap justify-content-center" id="dealerCardSection">
            <!-- Cards will be appended here -->
        </div>
    </div>
    <div class="playerSection">
        <div class="d-flex justify-content-between flex-grow-1 mx-4">
            <h2 class="softText" id="playerHandValue">Player's Hand:</h2>
            <div class="btnSection">
                <button disabled class="btn btn-primary" id="hit">Hit</button>
                <button disabled class="btn btn-primary" id="stand">Stand</button>
            </div>
        </div>
        <div class="cardSection d-flex flex-wrap justify-content-center" id="playerCardSection">
            <!-- Cards will be appended here -->
        </div>
    </div>

    <!-- Different Menus (not always visible) -->
    <div class="d-flex justify-content-center">
        <div class="flex-column align-items-center" id="roundOverSection">
            <h2 id="roundResult">
                <!-- Result will be added here -->
            </h2>
            <button class="btn btn-primary" id="newHand">New Hand</button>
        </div>
    </div>

    <div class="d-flex justify-content-center">
        <form id="authForm">
            <div class="mb-3">
                <input type="email" class="form-control" id="email" placeholder="Email" required>
            </div>
            <div class="mb-3">
                <input type="password" class="form-control" id="password" placeholder="Password" required>
            </div>
            <button type="button" class="btn btn-primary" id="loginBtn">Login</button>
            <button type="button" class="btn btn-secondary" id="registerBtn">Register</button>
            <div id="authMessage" class="mt-2"></div>
        </form>
    </div>


    <footer>
        <h4>XP: </h4>
    </footer>
    <script src="scripts/main.js" type="module"></script>
</body>

</html>
